<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote Generator</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

/* BODY */
body{
background:rgb(225, 240, 243);
display:flex;
flex-direction:column;
min-height:100vh;
padding:20px;
}

/* HEADER */
.header{
width:100%;
max-width:800px;
display:flex;
justify-content:space-between;
align-items:center;
margin:0 auto 20px auto;
}

.header h2{
color:#1b263b;
}

.icon-group{
display:flex;
gap:15px;
}

.saved-icon{
color:#1b263b;
font-size:22px;
cursor:pointer;
}

/* MAIN CENTER AREA */
.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
width:100%;
}

/* CONTAINER */
.container{
background:#1b263b;
padding:40px;
border-radius:15px;
width:800px;
max-width:100%;
color:white;
text-align:center;
box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* TEXT */
.author{
font-size:1.2rem;
margin-bottom:10px;
font-weight:bold;
}

h1{
font-size:1.8rem;
margin-bottom:20px;
font-style:italic;
}

/* LOADER */
.loader{
display:none;
margin:10px 0;
}

/* BUTTONS */
.button-group{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
}

.button{
background:#e8eaec;
color:rgb(32, 9, 91);
font-weight: 450;
padding:10px 20px;
border-radius:8px;
border:none;
cursor:pointer;
}

.button:hover{
background:#dbd8de;
}

/* STATUS */
#status{
margin-top:15px;
font-size:0.9rem;
color:#053f79;
text-align:center;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>Quote Generator</h2>

    <div class="icon-group">
        <!-- Analytics -->
        <a href="Analytics.html" class="saved-icon">
            <i class="fas fa-chart-bar"></i>
        </a>

        <!-- Saved -->
        <a href="SavedQuotes.html" class="saved-icon">
            <i class="fas fa-bookmark"></i>
        </a>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <div class="container">

        <p class="author" id="author"></p>
        <h1 id="quote">Click Generate to load quote</h1>

        <div class="loader" id="loader">⏳ Loading...</div>

        <button id="retryBtn" onclick="generateQuote()" style="display:none;">
            Retry
        </button>

        <div class="button-group">
            <button class="button" onclick="copyQuote()">Copy</button>
            <button class="button" onclick="saveQuote()">Save</button>
            <button class="button" onclick="speakQuote()"> Speak</button>
            <button class="button" onclick="generateQuote()">Generate</button>
        </div>

    </div>
</div>

<div id="status"></div>

<script>
let statusTimer = null;

/* DATE */
function getToday(){
    return new Date().toISOString().split("T")[0];
}

/* TRACK ANALYTICS */
function trackQuote(){
    let data = JSON.parse(localStorage.getItem("analytics")) || {};
    const today = getToday();
    data[today] = (data[today] || 0) + 1;
    localStorage.setItem("analytics", JSON.stringify(data));
}

/* GENERATE QUOTE */
async function generateQuote() {

    const loader = document.getElementById("loader");
    loader.style.display = "block";

    try {
        const response = await fetch("https://dummyjson.com/quotes/random");
        const data = await response.json();

        document.getElementById("quote").textContent = data.quote;
        document.getElementById("author").textContent = "- " + data.author;

        trackQuote();

    } catch {
        document.getElementById("quote").textContent = "Failed to load quote 😢";
        document.getElementById("author").textContent = "";
    } finally {
        loader.style.display = "none";
    }
}

/* COPY */
function copyQuote(){
    const text = document.getElementById("quote").textContent;
    navigator.clipboard.writeText(text);
    setStatus("Copied!");
}

/* SAVE */
function saveQuote(){

    const quote = document.getElementById("quote").textContent;
    const author = document.getElementById("author").textContent;

    let quotes = JSON.parse(localStorage.getItem("quotes")) || [];

    quotes.push({
        id: Date.now(),
        quote: quote,
        author: author
    });

    localStorage.setItem("quotes", JSON.stringify(quotes));

    setStatus("✅ Quote saved!");
}

/* SPEAK QUOTE */
function speakQuote(){

    const quote = document.getElementById("quote").textContent;
    const author = document.getElementById("author").textContent;

    // stop previous speech if running
    window.speechSynthesis.cancel();

    const speech = new SpeechSynthesisUtterance();

    speech.text = quote + " by " + author.replace("-", "");
    speech.lang = "en-US";
    speech.rate = 1;
    speech.pitch = 1;
    speech.volume = 1;

    window.speechSynthesis.speak(speech);

    setStatus("🔊 Speaking...");
}

/* STATUS */
function setStatus(message){
    const status = document.getElementById("status");
    status.textContent = message;

    if (statusTimer) clearTimeout(statusTimer);

    statusTimer = setTimeout(() => {
        status.textContent = "";
    }, 3000);
}

/* INIT */
generateQuote();
</script>

</body>
</html>
