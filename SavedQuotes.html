<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saved Quotes</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
background:#fdfdfe;
color:rgb(7, 5, 154);
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
min-height:100vh;
padding:40px;
text-align:center;
}

h1{
margin-bottom:30px;
}

.container{
width:800px;
max-width:100%;
color:white;
}

.quote{
background:#415a77;
padding:15px;
margin:12px 0;
border-radius:10px;
font-style:italic;
display:flex;
justify-content:space-between;
align-items:center;
}

.delete-btn{
background:#f9f7f7;
border:none;
color:rgb(4, 49, 154);
padding:6px 12px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.delete-btn:hover{
background:#fcfbfb;
}

.empty{
color:#ccc;
margin-top:20px;
}

.back-btn{
margin-top:30px;
padding:10px 20px;
background:#778da9;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-size:15px;
}

.back-btn:hover{
background:#e0aaff;
}

</style>
</head>

<body>

<h1>Saved Quotes</h1>

<div class="container" id="savedQuotes"></div>

<button class="back-btn" onclick="goBack()">← Back to Home</button>

<script>

const container=document.getElementById("savedQuotes");

function displayQuotes(){

let savedQuotes=JSON.parse(localStorage.getItem("savedQuotes")) || [];

if(savedQuotes.length===0){

container.innerHTML='<p class="empty">No saved quotes yet.</p>';

}else{

container.innerHTML=savedQuotes
.map((q,index)=>`
<div class="quote">
<span>${q}</span>
<button class="delete-btn" onclick="deleteQuote(${index})">Delete</button>
</div>
`)
.join("");

}

}

function deleteQuote(index){

let savedQuotes=JSON.parse(localStorage.getItem("savedQuotes")) || [];

savedQuotes.splice(index,1);

localStorage.setItem("savedQuotes",JSON.stringify(savedQuotes));

displayQuotes();

}

function goBack(){

window.location.href="HomePage.html";

}

displayQuotes();

</script>

</body>
</html>
