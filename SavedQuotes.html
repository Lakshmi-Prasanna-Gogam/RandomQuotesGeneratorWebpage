<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saved Quotes</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
background: linear-gradient(to right, #e4f3f3);
color:rgb(13, 13, 121);
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
padding:40px;
text-align:center;
}

h1{
margin-bottom:30px;
}

.container{
width:800px;
max-width:100%;
}

.quote{
background: #06196c;
padding:15px;
margin:12px 0;
border-radius:10px;
color:white;
display:flex;
flex-direction:column;
gap:10px;
}

.actions{
display:flex;
justify-content:flex-end; /* push to right */
gap:10px;                /* space between buttons */
}

.btn{
background:white;
border:none;
color:#081f83;
padding:6px 14px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.back-btn{
margin-top:30px;
padding:10px 20px;
background:#1c066d;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<h1>Saved Quotes</h1>
<div class="container" id="savedQuotes"></div>
<button class="back-btn" onclick="goBack()">← Back to Home</button>

<script>
const container = document.getElementById("savedQuotes");

/* Display Quotes */
function displayQuotes(){

    let quotes = JSON.parse(localStorage.getItem("quotes")) || [];

    if (quotes.length === 0){
        container.innerHTML = "<p>No saved quotes yet.</p>";
        return;
    }

    let html = "";

    quotes.reverse().forEach(q => {

        const text = `"${q.quote}" ${q.author}`;

        html += `
        <div class="quote">
            <span>${text}</span>

            <div class="actions">
                <button class="btn" onclick="shareQuote('${encodeURIComponent(text)}')">Share</button>
                <button class="btn" onclick="deleteQuote(${q.id})">Delete</button>
            </div>
        </div>
        `;
    });

    container.innerHTML = html;
}

/* Share */
function shareQuote(text){

    const decoded = decodeURIComponent(text);

    if (navigator.share) {
        navigator.share({
            text: decoded
        });
    } else {
        navigator.clipboard.writeText(decoded);
        alert("Copied! You can paste anywhere 👍");
    }
}

/* Delete */
function deleteQuote(id){

    let quotes = JSON.parse(localStorage.getItem("quotes")) || [];

    quotes = quotes.filter(q => q.id !== id);

    localStorage.setItem("quotes", JSON.stringify(quotes));

    displayQuotes();
}

/* Back */
function goBack(){
    window.location.href = "HomePage.html";
}

/* Load */
displayQuotes();
</script>

</body>
</html>
