<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
background:#eef2f7;
display:flex;
flex-direction:column;
align-items:center;
padding:30px;
}

h1{
color:#1b263b;
margin-bottom:20px;
}

/* KPI CARDS */
.kpi-container{
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:20px;
}

.kpi{
background:white;
padding:15px 20px;
border-radius:12px;
width:200px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
text-align:center;
}

.kpi h2{
font-size:22px;
color:#1b263b;
}

.kpi p{
font-size:13px;
color:#666;
margin-top:5px;
}

/* DASHBOARD CARD */
.container{
background:white;
padding:25px;
border-radius:12px;
width:850px;
max-width:100%;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* CHART */
.chart{
position:relative;
display:flex;
align-items:flex-end;
justify-content:space-between;
height:320px;
padding:20px;
border-left:2px solid #ccc;
border-bottom:2px solid #ccc;
background:linear-gradient(to top, #f8fafc 50%, transparent 50%);
}

/* GRID */
.chart::before{
content:"";
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
background-image: repeating-linear-gradient(
to top,
rgba(0,0,0,0.05),
rgba(0,0,0,0.05) 1px,
transparent 1px,
transparent 40px
);
pointer-events:none;
}

/* BAR */
.bar{
width:100%;
margin:0 6px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-end;
position:relative;
}

.bar-fill{
width:100%;
background:linear-gradient(180deg,#4f46e5,#778da9);
border-radius:6px 6px 0 0;
transition:0.5s;
}

/* VALUE */
.value{
position:absolute;
top:-22px;
font-size:12px;
color:#1b263b;
font-weight:bold;
}

/* LABEL */
.label{
margin-top:8px;
font-size:12px;
color:#555;
}

/* BACK BUTTON */
.back-btn{
margin-top:20px;
padding:10px 20px;
background:#1b263b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>📊 Quotes Analytics Dashboard</h1>

<!-- KPI SECTION -->
<div class="kpi-container">
    <div class="kpi">
        <h2 id="total">0</h2>
        <p>Total Quotes</p>
    </div>

    <div class="kpi">
        <h2 id="avg">0</h2>
        <p>Avg / Day</p>
    </div>

    <div class="kpi">
        <h2 id="best">0</h2>
        <p>Best Day</p>
    </div>
</div>

<!-- CHART -->
<div class="container">
    <div class="chart" id="chart"></div>
</div>

<button class="back-btn" onclick="goBack()">← Back to Home</button>

<script>

function loadAnalytics(){

    let data = JSON.parse(localStorage.getItem("analytics")) || {};

    const chart = document.getElementById("chart");

    let values = [];
    let total = 0;
    let best = 0;

    for(let i=6; i>=0; i--){
        let d = new Date();
        d.setDate(d.getDate() - i);

        let key = d.toISOString().split("T")[0];
        let count = data[key] || 0;

        total += count;
        if(count > best) best = count;

        values.push({
            date: key.slice(5),
            count: count
        });
    }

    let avg = (total / 7).toFixed(1);

    // KPI UPDATE
    document.getElementById("total").innerText = total;
    document.getElementById("avg").innerText = avg;
    document.getElementById("best").innerText = best;

    const max = Math.max(...values.map(v => v.count), 1);

    let html = "";

    values.forEach(v => {

        let height = (v.count / max) * 260;

        html += `
        <div class="bar">
            <div class="value">${v.count}</div>
            <div class="bar-fill" style="height:${height}px"></div>
            <div class="label">${v.date}</div>
        </div>
        `;
    });

    chart.innerHTML = html;
}

function goBack(){
    window.location.href = "HomePage.html";
}

loadAnalytics();

/* real-time update */
setInterval(loadAnalytics, 3000);

</script>

</body>
</html>
